<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout</title>

<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #f5f7fb;
  }

  /* HEADER */
  .header {
    background: linear-gradient(90deg, #1abc9c, #16a085);
    padding: 30px;
    color: white;
    font-size: 22px;
    font-weight: bold;
  }

  /* CONTAINER */
  .container {
    display: flex;
    gap: 20px;
    padding: 30px;
  }

  /* CARD STYLE (same as dashboard) */
  .card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }

  /* FORM */
  .form-section {
    flex: 2;
  }

  .form-section h3 {
    margin-bottom: 15px;
    color: #16a085;
  }

  .form-group {
    margin-bottom: 15px;
  }

  label {
    font-size: 14px;
    display: block;
    margin-bottom: 5px;
    color: #555;
  }

  input, select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    outline: none;
  }

  input:focus {
    border-color: #1abc9c;
  }

  .row {
    display: flex;
    gap: 10px;
  }

  /* SUMMARY */
  .summary {
    flex: 1;
  }

  .summary h3 {
    color: #16a085;
  }

  .summary div {
    margin: 10px 0;
    color: #555;
  }

  .total {
    font-size: 18px;
    font-weight: bold;
    color: #000;
  }

  /* BUTTON */
  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg, #1abc9c, #16a085);
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 15px;
  }

  .btn:hover {
    opacity: 0.9;
  }

  /* SUCCESS */
  .success {
    display: none;
    text-align: center;
    padding: 60px;
  }

  .success h2 {
    color: #16a085;
  }

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  Checkout
</div>

<div class="container">

  <!-- FORM -->
  <div class="card form-section">
    <h3>Billing Details</h3>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email">
    </div>

    <div class="form-group">
      <label>Address</label>
      <input type="text" id="address">
    </div>

    <div class="row">
      <div class="form-group">
        <label>City</label>
        <input type="text" id="city">
      </div>

      <div class="form-group">
        <label>Zip Code</label>
        <input type="text" id="zip">
      </div>
    </div>

    <div class="form-group">
      <label>Payment Method</label>
      <select id="payment">
        <option>Mobile Money</option>
        <option>Credit Card</option>
        <option>Cash on Delivery</option>
      </select>
    </div>
  </div>

  <!-- SUMMARY -->
  <div class="card summary">
    <h3>Order Summary</h3>

    <div>Items: GH₵ <span id="items">50.00</span></div>
    <div>Shipping: GH₵ <span id="shipping">5.00</span></div>
    <div class="total">Total: GH₵ <span id="total">55.00</span></div>

    <button class="btn" onclick="placeOrder()">Place Order</button>
  </div>

</div>

<!-- SUCCESS -->
<div class="success" id="success">
  <h2>✅ Order Successful</h2>
  <p>Your order has been placed successfully.</p>
</div>

<script>
function placeOrder() {
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let address = document.getElementById("address").value;

  if (!name || !email || !address) {
    alert("Please fill all required fields");
    return;
  }

  document.querySelector(".container").style.display = "none";
  document.getElementById("success").style.display = "block";
}
</script>

</body>
</html>
